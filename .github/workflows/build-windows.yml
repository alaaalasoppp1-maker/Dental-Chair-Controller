name: Build Chair Controller for Windows

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate
        run: npm run check

      - name: Build EXE without publishing
        run: npx electron-builder --win nsis portable --x64 --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: Dental-Chair-Controller-Windows
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14
