name: Build Chair Controller for Windows

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript
        run: npm run check

      - name: Build Windows EXE
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows builds
        uses: actions/upload-artifact@v4
        with:
          name: Dental-Chair-Controller-Windows
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 14
